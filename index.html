                  <script>
      window.addEventListener('DOMContentLoaded', function () {
        const androidLink = document.getElementById("android-download-link");
        const iosLink = document.getElementById("ios-download-link");
        const wrapper = document.querySelector(".download-links");
    
        function showLink(link) {
          androidLink.style.display = "none";
          iosLink.style.display = "none";
          link.style.display = "inline-block";
          wrapper?.setAttribute("data-links-amount", "1");
        }
    
        const ua = navigator.userAgent.toLowerCase();
        const isAndroid = ua.includes("android");
        const isIOS = /iphone|ipad|ipod/.test(ua);
    
        if (isAndroid) {
          showLink(androidLink);
        } else if (isIOS) {
          showLink(iosLink);
        } else {
          // fallback
          showLink(androidLink);
        }
      });
    </script>
    <script>
        // منع F12 و Ctrl+Shift+I و Ctrl+U و Ctrl+Shift+C
        document.addEventListener('keydown', function(e) {
            // F12
            if (e.key === 'F12') {
                e.preventDefault();
                return false;
            }
    
            // Ctrl + Shift + I
            if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i') {
                e.preventDefault();
                return false;
            }
    
            // Ctrl + Shift + C
            if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'c') {
                e.preventDefault();
                return false;
            }
    
            // Ctrl + U
            if (e.ctrlKey && e.key.toLowerCase() === 'u') {
                e.preventDefault();
                return false;
            }
        });
    
        // منع كليك يمين
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
    </script>
